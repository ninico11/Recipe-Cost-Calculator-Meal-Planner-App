# Declare the events block required by Nginx.
events {}

# Start the main HTTP configuration block.
http {
    # Include the MIME types file so static files get correct content types.
    include /etc/nginx/mime.types;

    # Set a safe default content type for unknown files.
    default_type application/octet-stream;

    # Create the web server that will serve the frontend.
    server {
        # Listen for HTTP traffic on port 80 inside the container.
        listen 80;

        # Set the root folder that contains the built React files.
        root /usr/share/nginx/html;

        # Set the default file served for directory requests.
        index index.html;

        # Handle all frontend routes and fall back to React's index.html.
        location / {
            # Try to serve the exact file, then a directory, then fall back to index.html.
            try_files $uri $uri/ /index.html;
        }

        # Forward API requests from the browser to the backend container.
        location /api/ {
            # Proxy those requests to the backend service created by Docker Compose.
            proxy_pass http://backend:8000/;

            # Pass the original host header to the backend.
            proxy_set_header Host $host;

            # Pass the real client IP to the backend.
            proxy_set_header X-Real-IP $remote_addr;

            # Pass the proxy chain information to the backend.
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Pass the original request scheme to the backend.
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
